name: Conic10K audit

on:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Download Conic10K raw data
        run: python scripts/download_conic10k.py --out-dir data/conic10k
      - name: Run Conic10K audit and stratified sample
        run: python -m conic10k.audit --data-dir data/conic10k --out-dir artifacts/conic10k --sample-size 100 --seed 20260623
      - name: Run full test suite
        run: pytest -q
      - name: Upload audit report and review samples
        uses: actions/upload-artifact@v4
        with:
          name: conic10k-audit-review-sample
          path: |
            artifacts/conic10k/conic10k_audit_report.json
            artifacts/conic10k/conic10k_review_sample_100.csv
            artifacts/conic10k/conic10k_review_sample_100.jsonl
            artifacts/conic10k/conic10k_review_sample_100.html
          if-no-files-found: error

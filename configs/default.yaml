# Default KCQRL-RL configuration. All external assets live outside this repo.
seed: 42
device: auto

assets:
  # In Colab, mount Drive at /content/drive before running scripts.
  base_dir: /content/drive/MyDrive/Colab_Projects/KCQRL-main/data/XES3G5M
  q_matrix: metadata/q_matrix_multihot_36_expert.pt
  item_bank: metadata/item_bank_128d.npy
  item_features: metadata/item_features_768d.npy
  ncdm_checkpoint: metadata/ncdm_model_36d_expert_best.pt
  mirt_checkpoint: metadata/mirt_model_36d.pt
  train_sequences: kc_level/train_valid_sequences.csv
  test_sequences: kc_level/test.csv

evaluation:
  horizon: 20
  max_students: 50
  candidate_size: 50
  policies:
    - Random
    - MIRT-MFI
    - MIRT-KLI
    - DDPG
    - OneStepOracle

training:
  episodes: 10
  batch_size: 32
  actor_lr: 0.00003
  critic_lr: 0.00001
  reward_scale: 10
  q_clip: 20
  policy_delay: 2
  gradient_clip: 1.0
  output_dir: outputs
  best_checkpoint_path: outputs/ddpg_actor_best.pt
  final_checkpoint_path: outputs/ddpg_actor_final.pt

benchmark:
  protocol: legacy
  policies:
    - Random
    - MIRT-MFI
    - MIRT-KLI
    - DDPG
    - OneStepOracle
  evaluator_model: ncdm
  query_ratio: 0.2
  min_query_items: 5
  warm_start_items: 1
  steps: [0, 1, 3, 5, 10, 20]
  seeds: [42]
  max_students: 300
  candidate_size: null
  save_split_manifest: true
  save_predictions: true
  save_traces: true
  output_dir: results/benchmark_v2
  mirt:
    theta_steps: 30
    theta_lr: 0.05
    theta_l2: 0.01
    theta_grad_clip: 5.0
    early_stop_tol: 1.0e-5
    d_opt_ridge: 0.01
    mkli_samples: 16
    mkli_scale: 0.25

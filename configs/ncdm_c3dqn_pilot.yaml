device: auto
paths:
  q_matrix: data/q_matrix.pt
  ncdm_checkpoint: outputs/ncdm/best.pt
  train_valid_sequences: data/train_valid_sequences.csv
training:
  output_dir: outputs/ncdm_c3dqn_pilot
  seed: 42
  epochs: 5
  max_students: 200
  train_ratio: 0.8
  selection_horizon: 10
  warm_start_items: 1
  batch_size: 16
  replay_capacity: 10000
  min_replay_size: 64
  updates_per_environment_step: 1
  gamma: 0.99
  learning_rate: 0.0005
  gradient_clip: 5.0
  tau: 0.01
  target_update_interval: 0
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 5000
  allow_item_count_intersection: false
  use_amp: true
  validate_every_epochs: 1
  early_stopping_patience: 3
  early_stopping_min_delta: 0.0001
model:
  d_model: 96
  n_heads: 4
  num_history_layers: 1
  candidate_set_encoder: isab
  num_set_layers: 1
  num_inducing_points: 16
  full_attention_max_candidates: 128
  dropout: 0.1

candidate_pool:
  prefilter_enabled: true
  prefilter_top_k: 256
  uncertainty_weight: 0.45
  weakness_weight: 0.30
  novelty_weight: 0.15
  discrimination_weight: 0.10
  diversity_enabled: true
  diversity_fraction: 0.20

evaluation:
  candidate_chunk_size: 256

debug:
  return_attention: false

alpha_fit:
  initial_steps: 8
  incremental_steps: 3
  lr: 0.05
  early_stop_tol: 0.00001
  grad_clip: 5.0
reward:
  prediction_weight: 1.0
  diagnosis_weight: 0.2
  coverage_weight: 0.05
  prediction_scale: 10.0
  reward_clip: 5.0

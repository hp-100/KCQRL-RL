device: auto
paths:
  q_matrix: data/q_matrix.pt
  ncdm_checkpoint: outputs/ncdm/best.pt
  train_valid_sequences: data/train_valid_sequences.csv
training:
  output_dir: outputs/ncdm_c3dqn_pilot
  seed: 42
  epochs: 5
  max_students: 200
  train_ratio: 0.8
  selection_horizon: 10
  warm_start_items: 1
  batch_size: 16
  replay_capacity: 10000
  min_replay_size: 64
  updates_per_environment_step: 1
  gamma: 0.99
  learning_rate: 0.0005
  gradient_clip: 5.0
  tau: 0.01
  target_update_interval: 0
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 5000
  allow_item_count_intersection: false
model:
  d_model: 128
  n_heads: 4
  num_history_layers: 2
  dropout: 0.1
alpha_fit:
  steps: 8
  lr: 0.05
  early_stop_tol: 0.00001
  grad_clip: 5.0
reward:
  prediction_weight: 1.0
  diagnosis_weight: 0.2
  coverage_weight: 0.05
  prediction_scale: 10.0
  reward_clip: 5.0
